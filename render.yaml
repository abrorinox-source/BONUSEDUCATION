services:
  - type: web
    name: score-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    autoDeployTrigger: commit
    healthCheckPath: /health
    envVars:
      - key: USE_WEBHOOK
        value: "true"
      - key: WEBHOOK_PATH
        value: /webhook
      - key: BOT_TOKEN
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: SHEET_ID
        sync: false
      - key: TEACHER_CODE
        sync: false

  - type: cron
    name: score-bot-keepalive
    runtime: python
    schedule: "*/10 * * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python -c "import os, urllib.request; urllib.request.urlopen(os.environ['HEALTHCHECK_URL'], timeout=10).read()"
    envVars:
      - key: HEALTHCHECK_URL
        sync: false
